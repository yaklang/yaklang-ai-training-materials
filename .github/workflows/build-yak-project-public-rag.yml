name: Build Yak Project Public RAG and Register

# 关键词: yak-project-public, RAG build, rags-latest.json, OSS, register
# 功能: 构建 yak-project-public 文章 RAG 索引，上传 OSS，并注册到 rags-latest.json 让 Yakit 客户端"线上知识库"可见
# 注册名: "Yak Project Public" / "Yak Project 公共知识"
# OSS 路径: /rag/yak-project-public/<YYYYMMDD-N>/yak-project-public.rag.gz
#
# 索引参考:
# - updateCWE.yaml (yaklang 仓库)
# - update-rags-latest.yml (本仓库)
# - updateAIToolsAndSkills.yaml (yaklang 仓库)

on:
  schedule:
    # 每天 UTC 03:00 (北京时间 11:00)，错峰 update-rags-latest 与其他工作流
    - cron: '0 3 * * *'

  push:
    branches:
      - main
    paths:
      - 'yak-project-public/**'
      - 'scripts/build-yak-project-public-search-index.yak'
      - '.github/workflows/build-yak-project-public-rag.yml'

  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '从零全量重建（跳过下载现有 RAG 做增量）'
        required: false
        type: boolean
        default: false
      ai_model:
        description: 'AI 模型 (默认 memfit-light-free)'
        required: false
        type: string
        default: 'memfit-light-free'
      concurrency:
        description: '并发任务数 (默认 5)'
        required: false
        type: string
        default: '5'
      yak_engine_version:
        description: 'Yak 引擎版本 (默认 1.4.7-beta1)'
        required: false
        type: string
        default: '1.4.7-beta1'

concurrency:
  group: build-yak-project-public-rag
  cancel-in-progress: false

jobs:
  build-and-register:
    name: Build Yak Project Public RAG
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print trigger information
        run: |
          echo "============================================"
          echo "Build Yak Project Public RAG and Register"
          echo "============================================"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Force rebuild: ${{ github.event.inputs.force_rebuild || 'false' }}"
          echo "AI model: ${{ github.event.inputs.ai_model || 'memfit-light-free' }}"
          echo "Concurrency: ${{ github.event.inputs.concurrency || '5' }}"
          echo "============================================"

      # 关键词: download yak engine, online embedding
      # 与 update-rags-latest.yml 保持一致默认使用 1.4.7-beta1，
      # 该版本起 rag.OnlineEmbedding 内置 aibalance.yaklang.com/v1 免费 embedding-free 模型
      - name: Download Yak Engine
        run: |
          YAK_VERSION="${{ github.event.inputs.yak_engine_version }}"
          if [ -z "$YAK_VERSION" ]; then YAK_VERSION="1.4.7-beta1"; fi
          echo "Downloading Yak engine version: $YAK_VERSION"
          wget -q -O ./yak "https://aliyun-oss.yaklang.com/yak/${YAK_VERSION}/yak_linux_amd64"
          chmod +x ./yak
          ./yak version

      - name: Verify source directory
        run: |
          if [ ! -d yak-project-public ]; then
            echo "ERROR: yak-project-public directory not found in repository"
            exit 1
          fi
          ARTICLE_COUNT=$(find yak-project-public -maxdepth 1 -type f -name "*.md" \
            -not -name "INDEX.md" -not -name "README.md" | wc -l | tr -d ' ')
          echo "Found $ARTICLE_COUNT candidate markdown articles"
          if [ "$ARTICLE_COUNT" -lt 10 ]; then
            echo "ERROR: article count looks suspiciously low: $ARTICLE_COUNT"
            exit 1
          fi

      # 关键词: version YYYYMMDD-N, 404 probe, available slot
      # 版本号策略与 yaklang-aikb / CWE / MITRE 一致：当天日期 + 自增 index，
      # 探测 OSS 对应路径是否存在（HTTP 200 = 已被占用 / 404 = 可用）
      - name: Generate Version
        run: |
          DATE_STR=$(date +%Y%m%d)
          INDEX=1
          while true; do
            VERSION="${DATE_STR}-${INDEX}"
            CHECK_URL="https://yaklang.oss-accelerate.aliyuncs.com/rag/yak-project-public/${VERSION}/yak-project-public.rag.gz"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -I "$CHECK_URL" || echo "000")
            if [ "$HTTP_STATUS" = "404" ] || [ "$HTTP_STATUS" = "000" ]; then
              echo "Version $VERSION is available"
              break
            fi
            echo "Version $VERSION already exists, trying next index..."
            INDEX=$((INDEX + 1))
            if [ $INDEX -gt 100 ]; then
              echo "ERROR: Too many versions for today!"
              exit 1
            fi
          done
          echo "Using version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          RAG_OSS_DIR="/rag/yak-project-public/${VERSION}"
          echo "RAG_OSS_DIR=$RAG_OSS_DIR" >> $GITHUB_ENV

      # 关键词: download existing RAG, incremental baseline
      # 从 rags-latest.json 找到已注册的 "Yak Project Public" 文件路径，下载并解压作为增量基线。
      # force_rebuild=true 时跳过，走全量重建路径。
      - name: Download existing RAG (for incremental update)
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "=== FULL REBUILD requested: skip downloading existing baseline ==="
            exit 0
          fi
          echo "=== Trying to fetch existing Yak Project Public RAG baseline ==="
          wget -q -O rags-latest.json https://yaklang.oss-accelerate.aliyuncs.com/rag/rags-latest.json || {
            echo "No existing rags-latest.json"
            echo "[]" > rags-latest.json
          }
          jq empty rags-latest.json 2>/dev/null || echo "[]" > rags-latest.json
          OLD_RAG_PATH=$(jq -r '.[] | select(.name == "Yak Project Public") | .file' rags-latest.json 2>/dev/null || echo "")
          if [ -z "$OLD_RAG_PATH" ] || [ "$OLD_RAG_PATH" = "null" ]; then
            echo "No existing Yak Project Public registered in rags-latest.json (first build)"
            exit 0
          fi
          echo "Found existing RAG at: $OLD_RAG_PATH"
          OLD_RAG_URL="https://yaklang.oss-accelerate.aliyuncs.com${OLD_RAG_PATH}"
          wget -q -O yak-project-public-existing.rag.gz "$OLD_RAG_URL" || {
            echo "Failed to download existing RAG; will rebuild from scratch"
            rm -f yak-project-public-existing.rag.gz
            exit 0
          }
          ls -lh yak-project-public-existing.rag.gz
          # 关键词: yak gzip -d, decompress baseline
          # 解压后命名为 build 脚本期望的 --output 路径，让 build 脚本自动进入增量模式
          ./yak gzip -d -f yak-project-public-existing.rag.gz -o yak-project-public.rag || {
            echo "Failed to decompress existing RAG; will rebuild from scratch"
            rm -f yak-project-public.rag
            exit 0
          }
          ls -lh yak-project-public.rag
          echo "Baseline ready: yak-project-public.rag (incremental mode enabled)"

      # 关键词: build RAG, incremental retry, file size threshold, partial success
      # 容错策略：
      #   1. 脚本即使因为 AI 偶发失败 (failedCount>0) 而 os.Exit(1)，shell 层用 || true 吞掉非零退出
      #   2. 成功判据 = RAG 文件 >= MIN_ACCEPT_SIZE (5MB) 且任务成功率 >= MIN_SUCCESS_RATE
      #   3. 不满足则重试（最多 MAX_ATTEMPTS = 3）。脚本自带增量：
      #      - 已成功条目的 search_target 被 rag.DBQueryUniqueKnowledgeTitles 预加载到内存
      #      - 重试时这些条目被 O(1) 跳过，只重跑失败的少数任务，零额外 AI 成本
      #   4. 实在跑不完全 -> 只要文件 >= 5MB 仍然继续 compress/upload，下次手动触发会自动增量补完
      - name: Build Yak Project Public RAG (with retry)
        run: |
          AI_MODEL="${{ github.event.inputs.ai_model }}"
          if [ -z "$AI_MODEL" ]; then AI_MODEL="memfit-light-free"; fi
          CONCURRENCY="${{ github.event.inputs.concurrency }}"
          if [ -z "$CONCURRENCY" ]; then CONCURRENCY="5"; fi

          MAX_ATTEMPTS=3
          MIN_ACCEPT_SIZE=$((5 * 1024 * 1024))   # 5MB 兜底门槛
          MIN_SUCCESS_RATE=95                     # 成功率 >= 95% 视作"足够好"，无需再重试

          echo "=== Build Yak Project Public RAG ==="
          echo "Version: $VERSION"
          echo "AI model: $AI_MODEL"
          echo "Concurrency: $CONCURRENCY"
          echo "Max attempts: $MAX_ATTEMPTS"
          echo "Min accept size: $MIN_ACCEPT_SIZE bytes"
          echo "Min success rate: ${MIN_SUCCESS_RATE}%"

          BUILD_OK=0

          for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
            echo ""
            echo "==================== ATTEMPT $ATTEMPT / $MAX_ATTEMPTS ===================="
            if [ -f yak-project-public.rag ]; then
              CUR_SIZE=$(stat -c%s yak-project-public.rag)
              echo "Existing baseline: ${CUR_SIZE} bytes -> incremental mode"
            else
              echo "No baseline -> full rebuild mode"
            fi

            # 用 || true 吞掉 os.Exit(1)；shell 层只看产出
            ./yak scripts/build-yak-project-public-search-index.yak \
              --output yak-project-public.rag \
              --source-dir yak-project-public \
              --concurrency "$CONCURRENCY" \
              --ai-model "$AI_MODEL" || echo "(build script returned non-zero; checking outputs)"

            if [ ! -f yak-project-public.rag ]; then
              echo "Attempt $ATTEMPT: RAG file NOT generated, retrying..."
              continue
            fi

            SIZE=$(stat -c%s yak-project-public.rag)
            SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
            echo "Attempt $ATTEMPT: RAG file size = $SIZE bytes (${SIZE_MB} MB)"

            # 关键词: parse build-report.md, 兼容旧格式（无"处理成功"字段）
            # 优先用"处理成功"字段，fallback 用"任务总数 - 处理失败"反推
            SUCCESS=0
            FAILED=0
            TOTAL_TASKS=0
            if [ -f yak-project-public.build-report.md ]; then
              SUCCESS=$(grep -oE '处理成功 \| [0-9]+' yak-project-public.build-report.md | head -1 | grep -oE '[0-9]+' || echo "")
              FAILED=$(grep -oE '处理失败 \| [0-9]+' yak-project-public.build-report.md | head -1 | grep -oE '[0-9]+' || echo "")
              TOTAL_TASKS=$(grep -oE '任务总数 \| [0-9]+' yak-project-public.build-report.md | head -1 | grep -oE '[0-9]+' || echo "")
            fi
            FAILED=${FAILED:-0}
            TOTAL_TASKS=${TOTAL_TASKS:-0}
            if [ -z "$SUCCESS" ] && [ "$TOTAL_TASKS" -gt 0 ]; then
              SUCCESS=$((TOTAL_TASKS - FAILED))
            fi
            SUCCESS=${SUCCESS:-0}
            TOTAL=$((SUCCESS + FAILED))
            if [ "$TOTAL" -gt 0 ]; then
              RATE=$((SUCCESS * 100 / TOTAL))
              echo "Attempt $ATTEMPT: success=$SUCCESS, failed=$FAILED, total=$TOTAL, rate=${RATE}%"
            else
              RATE=0
              echo "Attempt $ATTEMPT: no task counters in report"
            fi

            if [ "$SIZE" -ge "$MIN_ACCEPT_SIZE" ] && [ "$FAILED" -eq 0 ]; then
              echo "Attempt $ATTEMPT: PERFECT - file size OK and zero failures"
              BUILD_OK=1
              break
            fi

            if [ "$SIZE" -ge "$MIN_ACCEPT_SIZE" ] && [ "$RATE" -ge "$MIN_SUCCESS_RATE" ] && [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Attempt $ATTEMPT: ACCEPTABLE - file >= 5MB and rate >= ${MIN_SUCCESS_RATE}% on last attempt"
              BUILD_OK=1
              break
            fi

            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              echo "Attempt $ATTEMPT: not yet acceptable, will retry (incremental fills only $FAILED missing tasks)"
            fi
          done

          if [ ! -f yak-project-public.rag ]; then
            echo "FATAL: no RAG file after $MAX_ATTEMPTS attempts"
            exit 1
          fi
          FINAL_SIZE=$(stat -c%s yak-project-public.rag)
          if [ "$FINAL_SIZE" -lt "$MIN_ACCEPT_SIZE" ]; then
            echo "FATAL: RAG file too small (${FINAL_SIZE} bytes < ${MIN_ACCEPT_SIZE}) after $MAX_ATTEMPTS attempts"
            exit 1
          fi

          if [ "$BUILD_OK" = "1" ]; then
            echo ""
            echo "=== Build accepted (BUILD_OK=1) ==="
          else
            echo ""
            echo "=== Build PARTIAL but file size >= 5MB; uploading anyway ==="
            echo "    Next manual run will pick up where this left off (incremental)."
          fi
          ls -lh yak-project-public.rag

          REPORT_FILE="yak-project-public.build-report.md"
          if [ -f "$REPORT_FILE" ]; then
            echo ""
            echo "=== Build Report ==="
            cat "$REPORT_FILE"
          fi

      # 关键词: gzip compress, sha256 checksum, file size guard
      - name: Compress RAG and generate SHA256
        run: |
          RAG_FILE=yak-project-public.rag
          RAG_GZ_FILE=yak-project-public.rag.gz
          SHA256_FILE=yak-project-public.rag.gz.sha256.txt

          echo "=== Compressing RAG file ==="
          # yak gzip 输出 .gzip 后缀，需要重命名为 .gz
          ./yak gzip -f "$RAG_FILE"
          mv "${RAG_FILE}.gzip" "$RAG_GZ_FILE"

          FILE_SIZE=$(stat -c%s "$RAG_GZ_FILE")
          FILE_SIZE_MB=$(echo "scale=2; $FILE_SIZE/1024/1024" | bc)
          echo "RAG.gz size: $FILE_SIZE bytes (${FILE_SIZE_MB} MB)"

          # 关键词: size guard 1MB lower bound
          # yak-project-public.rag.gz 全量约 30MB，增量后至少应该 > 1MB
          SIZE_LIMIT=$((1 * 1024 * 1024))
          if [ "$FILE_SIZE" -lt "$SIZE_LIMIT" ]; then
            echo "ERROR: RAG.gz size is less than 1MB; build looks broken"
            exit 1
          fi
          echo "RAG_FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV

          SHA256_HASH=$(sha256sum "$RAG_GZ_FILE" | awk '{print $1}')
          echo "$SHA256_HASH" > "$SHA256_FILE"
          echo "SHA256: $SHA256_HASH"
          echo "SHA256_HASH=$SHA256_HASH" >> $GITHUB_ENV

      # 关键词: upload-oss, .rag.gz, .sha256.txt, build-report.md
      - name: Upload RAG files to OSS
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          if [ -z "$OSS_KEY_ID" ] || [ -z "$OSS_KEY_SECRET" ]; then
            echo "ERROR: OSS_KEY_ID / OSS_KEY_SECRET secrets not set"
            exit 1
          fi
          echo "=== Uploading RAG.gz ==="
          ./yak upload-oss \
            -b yaklang --endpoint oss-accelerate.aliyuncs.com \
            -ak "$OSS_KEY_ID" -sk "$OSS_KEY_SECRET" -t 10 \
            -f "yak-project-public.rag.gz:${RAG_OSS_DIR}/yak-project-public.rag.gz"

          echo "=== Uploading SHA256 ==="
          ./yak upload-oss \
            -b yaklang --endpoint oss-accelerate.aliyuncs.com \
            -ak "$OSS_KEY_ID" -sk "$OSS_KEY_SECRET" -t 5 \
            -f "yak-project-public.rag.gz.sha256.txt:${RAG_OSS_DIR}/yak-project-public.rag.gz.sha256.txt"

          if [ -f yak-project-public.build-report.md ]; then
            echo "=== Uploading build-report.md ==="
            ./yak upload-oss \
              -b yaklang --endpoint oss-accelerate.aliyuncs.com \
              -ak "$OSS_KEY_ID" -sk "$OSS_KEY_SECRET" -t 5 \
              -f "yak-project-public.build-report.md:${RAG_OSS_DIR}/yak-project-public.build-report.md" || \
              echo "WARNING: failed to upload build report (non-critical)"
          fi

      # 关键词: rags-latest.json, rag-metainfo, register-name, register-name-zh
      # 把 "Yak Project Public" / "Yak Project 公共知识" 注册到 rags-latest.json，
      # 这是 Yakit 客户端"线上知识库"列表唯一数据源。
      - name: Update rags-latest.json
        run: |
          echo "=== Downloading existing rags-latest.json ==="
          wget -q -O rags-latest.json https://yaklang.oss-accelerate.aliyuncs.com/rag/rags-latest.json || {
            echo "No existing rags-latest.json; creating empty array"
            echo "[]" > rags-latest.json
          }
          jq empty rags-latest.json 2>/dev/null || echo "[]" > rags-latest.json

          echo "=== Existing entries ==="
          jq -r '.[] | .name' rags-latest.json || true

          echo "=== Registering Yak Project Public ==="
          ./yak rag-metainfo \
            -f rags-latest.json \
            -o rags-latest.json \
            --register-name "Yak Project Public" \
            --register-name-zh "Yak Project 公共知识" \
            --version "$VERSION" \
            --rag-file "${RAG_OSS_DIR}/yak-project-public.rag.gz" \
            --hash-file "${RAG_OSS_DIR}/yak-project-public.rag.gz.sha256.txt" \
            --hash "$SHA256_HASH" \
            --file-size "$RAG_FILE_SIZE"

          echo "=== New rags-latest.json content ==="
          cat rags-latest.json | jq .

      - name: Upload rags-latest.json to OSS
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ./yak upload-oss \
            -b yaklang --endpoint oss-accelerate.aliyuncs.com \
            -ak "$OSS_KEY_ID" -sk "$OSS_KEY_SECRET" -t 5 \
            -f "rags-latest.json:/rag/rags-latest.json"

      # 关键词: verify, HTTP HEAD, oss-qn mirror
      # 校验三个端点都可达：
      # 1) 加速节点 oss-accelerate.aliyuncs.com (上传后立即可访问)
      # 2) 七牛镜像 oss-qn.yaklang.com (Yakit 客户端实际拉取的地址)
      - name: Verify uploads
        run: |
          echo "=== Verify on oss-accelerate ==="
          curl -I "https://yaklang.oss-accelerate.aliyuncs.com${RAG_OSS_DIR}/yak-project-public.rag.gz" | head -5
          curl -I "https://yaklang.oss-accelerate.aliyuncs.com${RAG_OSS_DIR}/yak-project-public.rag.gz.sha256.txt" | head -5
          echo ""
          echo "=== Verify rags-latest.json on oss-accelerate ==="
          curl -s "https://yaklang.oss-accelerate.aliyuncs.com/rag/rags-latest.json" | \
            jq '.[] | select(.name == "Yak Project Public")'
          echo ""
          echo "=== Yakit client mirror (oss-qn.yaklang.com) ==="
          # 七牛 CDN 缓存可能有几分钟延迟，仅校验状态码
          curl -I "https://oss-qn.yaklang.com/rag/rags-latest.json" | head -3 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yak-project-public-rag
          path: |
            yak-project-public.rag.gz
            yak-project-public.rag.gz.sha256.txt
            yak-project-public.build-report.md
            rags-latest.json
          retention-days: 30

      - name: Summary
        run: |
          echo "## Yak Project Public RAG Built and Registered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Register Name | \`Yak Project Public\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Display Name (zh) | \`Yak Project 公共知识\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| File Size | $RAG_FILE_SIZE bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`$SHA256_HASH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Model | \`${{ github.event.inputs.ai_model || 'memfit-light-free' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Concurrency | \`${{ github.event.inputs.concurrency || '5' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          echo "- RAG: https://yaklang.oss-accelerate.aliyuncs.com${RAG_OSS_DIR}/yak-project-public.rag.gz" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256: https://yaklang.oss-accelerate.aliyuncs.com${RAG_OSS_DIR}/yak-project-public.rag.gz.sha256.txt" >> $GITHUB_STEP_SUMMARY
          echo "- Index: https://yaklang.oss-accelerate.aliyuncs.com/rag/rags-latest.json" >> $GITHUB_STEP_SUMMARY
          echo "- Yakit mirror: https://oss-qn.yaklang.com/rag/rags-latest.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          REPORT_FILE="yak-project-public.build-report.md"
          if [ -f "$REPORT_FILE" ]; then
            echo "### Build Report" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
          fi
