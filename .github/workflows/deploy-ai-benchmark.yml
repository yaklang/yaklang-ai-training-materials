name: Deploy AI Benchmark

on:
  # 当指定文件有改动时触发
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'apps/ai-vuln-detection-benchmark/**'
  #     - '.github/workflows/deploy-ai-benchmark.yml'
  
  # 允许手动触发
  workflow_dispatch:

# 确保同一时间只运行一个部署任务
concurrency:
  group: deploy-ai-benchmark
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    
    env:
      APP_NAME: ai-benchmark
      APP_PATH: apps/ai-vuln-detection-benchmark
      REPORT_VIEWER_SCRIPT: report-viewer.yak
      REPORT_VIEWER_SERVICE_NAME: yak-ai-benchmark-report-viewer
      AUTO_RUNNER_SERVICE_NAME: ai-benchmark-auto-runner
      AUTO_RUNNER_TIMER_NAME: ai-benchmark-auto-runner.timer
      WORK_DIR: /root/yaklang-ai-training-materials
      YAK_VERSION: 1.4.5-alpha260129
      YAK_PATH: /usr/local/bin/yak-1.4.5-alpha260129
      REPORT_VIEWER_PORT: ${{ secrets.AI_BENCHMARK_REPORT_PORT }}
      REPORT_DIR: /root/ai-benchmark-reports-v2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Print trigger information
        run: |
          echo "============================================"
          echo "部署应用: ${{ env.APP_NAME }}"
          echo "Report Viewer 服务: ${{ env.REPORT_VIEWER_SERVICE_NAME }}"
          echo "触发方式: ${{ github.event_name }}"
          echo "分支: ${{ github.ref }}"
          echo "提交: ${{ github.sha }}"
          echo "操作者: ${{ github.actor }}"
          echo "============================================"
      
      - name: Validate secrets
        run: |
          echo "=== 验证 Secrets ==="
          
          if [ -z "${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}" ]; then
            echo "ERROR: EMBEDDING_HOST_PRIVATE_KEY secret 未设置"
            exit 1
          fi
          echo "✓ EMBEDDING_HOST_PRIVATE_KEY 已设置"
          
          if [ -z "${{ secrets.EMBEDDING_HOST }}" ]; then
            echo "ERROR: EMBEDDING_HOST secret 未设置"
            exit 1
          fi
          echo "✓ EMBEDDING_HOST 已设置"
          
          if [ -z "${{ secrets.AI_BENCHMARK_API_KEY }}" ]; then
            echo "WARNING: AI_BENCHMARK_API_KEY secret 未设置，将使用配置文件中的默认值"
          else
            echo "✓ AI_BENCHMARK_API_KEY 已设置"
          fi
          
          echo "✓ Secrets 验证完成"
      
      - name: Prepare deployment package
        env:
          AI_BENCHMARK_API_KEY: ${{ secrets.AI_BENCHMARK_API_KEY }}
        run: |
          echo "=== 准备部署包 ==="
          
          # 验证配置文件存在
          CONFIG_DIR="${{ env.APP_PATH }}/config"
          
          if [ ! -f "$CONFIG_DIR/test-config.json" ]; then
            echo "ERROR: $CONFIG_DIR/test-config.json 不存在"
            exit 1
          fi
          echo "✓ test-config.json 存在"
          
          if [ ! -f "$CONFIG_DIR/ai-config.json" ]; then
            echo "ERROR: $CONFIG_DIR/ai-config.json 不存在"
            exit 1
          fi
          echo "✓ ai-config.json 存在"
          
          # 创建部署目录结构
          DEPLOY_DIR="deploy-package"
          mkdir -p "$DEPLOY_DIR"/{app-files,configs,scripts,apps}
          
          # 1. 复制应用文件（跳过 .md 文件和 config 目录）
          echo "准备应用文件..."
          for file in ${{ env.APP_PATH }}/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              if [[ "$filename" != *.md ]]; then
                echo "  → $filename"
                cp "$file" "$DEPLOY_DIR/app-files/"
              fi
            fi
          done
          
          # 2. 复制 resources 目录（如果存在）
          RESOURCES_DIR="${{ env.APP_PATH }}/resources"
          if [ -d "$RESOURCES_DIR" ]; then
            echo "准备 resources 目录..."
            mkdir -p "$DEPLOY_DIR/resources"
            cp -r "$RESOURCES_DIR"/* "$DEPLOY_DIR/resources/" 2>/dev/null || true
            echo "✓ Resources 目录已复制"
            echo "Resources 内容:"
            find "$DEPLOY_DIR/resources" -type f | head -20
          else
            echo "⚠ Resources 目录不存在，跳过"
          fi
          
          # 3. 复制配置文件
          echo "准备配置文件..."
          cp "$CONFIG_DIR/test-config.json" "$DEPLOY_DIR/configs/"
          cp "$CONFIG_DIR/ai-config.json" "$DEPLOY_DIR/configs/"
          
          # 4. 创建环境变量配置文件
          echo "创建环境变量配置文件..."
          
          # Benchmark 环境变量配置文件（包含 API Key）
          cat > "$DEPLOY_DIR/configs/benchmark-config.env" << EOF
          # AI Benchmark 应用配置
          REPORT_DIR=${{ env.REPORT_DIR }}
          AI_BENCHMARK_API_KEY=${AI_BENCHMARK_API_KEY}
          EOF
          
          # Report Viewer 环境变量配置文件
          cat > "$DEPLOY_DIR/configs/report-viewer-config.env" << EOF
          # AI Benchmark Report Viewer 配置
          REPORT_VIEWER_PORT=${{ env.REPORT_VIEWER_PORT }}
          REPORT_DIR=${{ env.REPORT_DIR }}
          EOF
          
          # 5. 复制部署脚本
          echo "准备部署脚本..."
          cp ./apps/deploy-yak-app.sh "$DEPLOY_DIR/apps/"
          cp ./scripts/install-yak-scripts-to-systemd.yak "$DEPLOY_DIR/scripts/"
          
          # 显示配置文件内容（用于验证）
          echo ""
          echo "=== 配置文件内容验证 ==="
          echo "--- benchmark-config.env ---"
          cat "$DEPLOY_DIR/configs/benchmark-config.env"
          echo ""
          echo "--- report-viewer-config.env ---"
          cat "$DEPLOY_DIR/configs/report-viewer-config.env"
          echo ""
          
          # 显示部署包内容
          echo "=== 部署包内容 ==="
          find "$DEPLOY_DIR" -type f | head -30
          
          echo ""
          echo "✓ 部署包准备完成"
      
      - name: Create remote directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          script: |
            echo "=== 创建远程目录 ==="
            mkdir -p ${{ env.WORK_DIR }}/${{ env.APP_PATH }}
            mkdir -p ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/resources
            mkdir -p ${{ env.WORK_DIR }}/apps
            mkdir -p ${{ env.WORK_DIR }}/scripts
            mkdir -p ${{ env.REPORT_DIR }}
            echo "✓ 目录创建完成"
      
      - name: Upload application files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          source: "deploy-package/app-files/*"
          target: "${{ env.WORK_DIR }}/${{ env.APP_PATH }}/"
          strip_components: 2
      
      - name: Upload config files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          source: "deploy-package/configs/*"
          target: "/tmp/ai-benchmark-configs/"
          strip_components: 2
      
      - name: Upload resources directory
        if: hashFiles('deploy-package/resources/**') != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          source: "deploy-package/resources/*"
          target: "${{ env.WORK_DIR }}/${{ env.APP_PATH }}/"
          strip_components: 1
      
      - name: Upload deploy scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          source: "deploy-package/apps/*,deploy-package/scripts/*"
          target: "/tmp/ai-benchmark-deploy/"
          strip_components: 1
      
      - name: Setup files on remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          script: |
            echo "=== 设置文件 ==="
            
            # 移动部署脚本
            echo "移动部署脚本..."
            mv /tmp/ai-benchmark-deploy/apps/deploy-yak-app.sh ${{ env.WORK_DIR }}/apps/deploy-yak-app.sh
            chmod +x ${{ env.WORK_DIR }}/apps/deploy-yak-app.sh
            
            mv /tmp/ai-benchmark-deploy/scripts/install-yak-scripts-to-systemd.yak ${{ env.WORK_DIR }}/scripts/install-yak-scripts-to-systemd.yak
            
            # 移动配置文件
            echo "移动配置文件..."
            mv -f /tmp/ai-benchmark-configs/test-config.json ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/test-config.json
            mv -f /tmp/ai-benchmark-configs/ai-config.json ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/ai-config.json
            mv -f /tmp/ai-benchmark-configs/benchmark-config.env ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/.env.benchmark
            mv -f /tmp/ai-benchmark-configs/report-viewer-config.env ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/.env.report-viewer
            
            # 验证配置文件内容
            echo ""
            echo "=== 验证配置文件内容 ==="
            echo "--- .env.benchmark ---"
            cat ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/.env.benchmark
            echo ""
            echo "--- .env.report-viewer ---"
            cat ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/.env.report-viewer
            echo ""
            
            # 设置脚本执行权限
            echo "设置脚本执行权限..."
            chmod +x ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/auto-benchmark.sh
            
            # 清理临时目录
            rm -rf /tmp/ai-benchmark-deploy /tmp/ai-benchmark-configs
            
            echo ""
            echo "=== 验证文件 ==="
            ls -lh ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/
            
            echo ""
            echo "=== 验证 Resources 目录 ==="
            if [ -d "${{ env.WORK_DIR }}/${{ env.APP_PATH }}/resources" ]; then
              echo "Resources 目录内容:"
              ls -lh ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/resources/
            else
              echo "⚠ Resources 目录不存在"
            fi
            
            echo ""
            echo "✓ 文件设置完成"
      
      - name: Deploy Report Viewer Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          script: |
            echo "=== 部署 Report Viewer 服务 ==="
            
            echo "执行部署命令..."
            ${{ env.WORK_DIR }}/apps/deploy-yak-app.sh \
              --service-name "${{ env.REPORT_VIEWER_SERVICE_NAME }}" \
              --main-script "${{ env.APP_PATH }}/${{ env.REPORT_VIEWER_SCRIPT }}" \
              --work-dir "${{ env.WORK_DIR }}" \
              --yak-version "${{ env.YAK_VERSION }}" \
              --yak-path "${{ env.YAK_PATH }}" \
              --config-file "${{ env.APP_PATH }}/.env.report-viewer" \
              --script-args '--port $REPORT_VIEWER_PORT --report-dir $REPORT_DIR --frontend ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/report-viewer.html' \
              --verify-port "${{ env.REPORT_VIEWER_PORT }}" \
              --install-yak
            
            echo ""
            echo "✓ Report Viewer 部署完成"
      
      - name: Deploy Auto Runner Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          script: |
            echo "=== 部署 Auto Runner 定时服务 ==="
            
            # 1. 复制 service 和 timer 文件到 systemd 目录
            echo "Installing systemd service and timer files..."
            cp ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/ai-benchmark-auto-runner.service /etc/systemd/system/
            cp ${{ env.WORK_DIR }}/${{ env.APP_PATH }}/ai-benchmark-auto-runner.timer /etc/systemd/system/
            
            # 2. 重新加载 systemd
            echo "Reloading systemd daemon..."
            systemctl daemon-reload
            
            # 3. 停止旧的服务（如果正在运行）
            echo "Stopping old services if running..."
            systemctl stop ai-benchmark-auto-runner.timer || true
            systemctl stop ai-benchmark-auto-runner.service || true
            
            # 4. 启用并启动 timer
            echo "Enabling and starting timer..."
            systemctl enable ai-benchmark-auto-runner.timer
            systemctl start ai-benchmark-auto-runner.timer
            
            # 5. 验证服务状态
            echo ""
            echo "Checking timer status..."
            systemctl status ai-benchmark-auto-runner.timer --no-pager || true
            
            echo ""
            echo "Listing active timers..."
            systemctl list-timers ai-benchmark-auto-runner.timer --no-pager || true
            
            echo ""
            echo "✓ Auto Runner 定时服务部署成功"
      
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EMBEDDING_HOST }}
          username: root
          key: ${{ secrets.EMBEDDING_HOST_PRIVATE_KEY }}
          script: |
            echo "=== 验证部署 ==="
            
            # 等待服务启动
            echo "等待服务稳定..."
            sleep 5
            
            # 验证 Report Viewer 服务
            echo ""
            echo "检查 Report Viewer 服务状态..."
            systemctl is-active ${{ env.REPORT_VIEWER_SERVICE_NAME }} && echo "✓ Report Viewer 服务已激活" || echo "✗ Report Viewer 服务未激活"
            
            echo ""
            echo "Report Viewer 服务状态详情..."
            systemctl status ${{ env.REPORT_VIEWER_SERVICE_NAME }} --no-pager -l || true
            
            # 健康检查 Report Viewer
            echo ""
            echo "Report Viewer 健康检查..."
            curl -f http://127.0.0.1:${{ env.REPORT_VIEWER_PORT }}/ 2>/dev/null && echo "✓ Report Viewer 响应正常" || echo "⚠ Report Viewer 健康检查失败"
            
            # 验证 Auto Runner Timer
            echo ""
            echo "检查 Auto Runner Timer 状态..."
            systemctl is-active ai-benchmark-auto-runner.timer && echo "✓ Auto Runner Timer 已激活" || echo "✗ Auto Runner Timer 未激活"
            
            echo ""
            echo "Auto Runner Timer 状态详情..."
            systemctl status ai-benchmark-auto-runner.timer --no-pager -l || true
            
            echo ""
            echo "下次执行时间..."
            systemctl list-timers ai-benchmark-auto-runner.timer --no-pager || true
            
            # 检查报告目录
            echo ""
            echo "检查报告目录..."
            ls -lh ${{ env.REPORT_DIR }} 2>/dev/null && echo "✓ 报告目录存在" || echo "⚠ 报告目录为空或不存在"
            
            echo ""
            echo "✓ 服务验证完成"
      
      - name: Cleanup
        if: always()
        run: |
          echo "=== 清理 ==="
          rm -rf deploy-package
          echo "✓ 清理完成"
      
      - name: Summary
        if: success()
        run: |
          echo "## ✅ AI Benchmark 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AI 漏洞检测基准测试系统已成功部署到远程服务器。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 部署详情" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Report Viewer 服务" >> $GITHUB_STEP_SUMMARY
          echo "- 服务名称: \`${{ env.REPORT_VIEWER_SERVICE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 脚本: \`${{ env.APP_PATH }}/${{ env.REPORT_VIEWER_SCRIPT }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 端口: \`${{ env.REPORT_VIEWER_PORT }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 访问方式: Web 界面" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Auto Runner 定时服务" >> $GITHUB_STEP_SUMMARY
          echo "- 服务名称: \`${{ env.AUTO_RUNNER_SERVICE_NAME }}.service\`" >> $GITHUB_STEP_SUMMARY
          echo "- 定时器名称: \`${{ env.AUTO_RUNNER_TIMER_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 脚本: \`${{ env.APP_PATH }}/auto-benchmark.sh\`" >> $GITHUB_STEP_SUMMARY
          echo "- 运行模式: 定时任务 (每 5 分钟)" >> $GITHUB_STEP_SUMMARY
          echo "- 配置来源: apps/ai-vuln-detection-benchmark/config/" >> $GITHUB_STEP_SUMMARY
          echo "- API Key: GitHub Secrets (AI_BENCHMARK_API_KEY)" >> $GITHUB_STEP_SUMMARY
          echo "- 功能: 自动检测新引擎版本并执行测试" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 共享配置" >> $GITHUB_STEP_SUMMARY
          echo "- 报告目录: \`${{ env.REPORT_DIR }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 工作目录: \`${{ env.WORK_DIR }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 引擎存储: \`/root/yaklang-ai-training-materials/ai-vuln-detection-benchmark-service/yak-engine\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 构建信息" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 触发者: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- YAK 版本: \`${{ env.YAK_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 服务管理命令" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Report Viewer 服务" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# 查看服务状态" >> $GITHUB_STEP_SUMMARY
          echo "systemctl status ${{ env.REPORT_VIEWER_SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 查看服务日志" >> $GITHUB_STEP_SUMMARY
          echo "journalctl -u ${{ env.REPORT_VIEWER_SERVICE_NAME }} -f" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 重启服务" >> $GITHUB_STEP_SUMMARY
          echo "systemctl restart ${{ env.REPORT_VIEWER_SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Auto Runner 定时服务" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# 查看定时器状态" >> $GITHUB_STEP_SUMMARY
          echo "systemctl status ${{ env.AUTO_RUNNER_TIMER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 查看下次执行时间" >> $GITHUB_STEP_SUMMARY
          echo "systemctl list-timers ${{ env.AUTO_RUNNER_TIMER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 查看服务日志" >> $GITHUB_STEP_SUMMARY
          echo "journalctl -u ${{ env.AUTO_RUNNER_SERVICE_NAME }} -f" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 查看脚本日志" >> $GITHUB_STEP_SUMMARY
          echo "tail -f /root/yaklang-ai-training-materials/ai-vuln-detection-benchmark-service/auto-benchmark.log" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 手动触发一次执行" >> $GITHUB_STEP_SUMMARY
          echo "systemctl start ${{ env.AUTO_RUNNER_SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 停止定时器" >> $GITHUB_STEP_SUMMARY
          echo "systemctl stop ${{ env.AUTO_RUNNER_TIMER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 启动定时器" >> $GITHUB_STEP_SUMMARY
          echo "systemctl start ${{ env.AUTO_RUNNER_TIMER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 注意事项" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Auto Runner 会每 5 分钟自动检查最新引擎版本" >> $GITHUB_STEP_SUMMARY
          echo "- 发现新版本时自动下载并执行测试" >> $GITHUB_STEP_SUMMARY
          echo "- 配置文件从 config/ 目录自动部署，API Key 从 GitHub Secrets 读取" >> $GITHUB_STEP_SUMMARY
          echo "- 两个服务共享报告目录: \`${{ env.REPORT_DIR }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Report Viewer 提供 Web 界面查看报告（端口 \`${{ env.REPORT_VIEWER_PORT }}\`）" >> $GITHUB_STEP_SUMMARY
          echo "- 测试会自动安装并启动 vulinbox 靶场" >> $GITHUB_STEP_SUMMARY
          echo "- 更新配置需修改 config/ 目录下的配置文件后重新部署" >> $GITHUB_STEP_SUMMARY
          echo "- 更新 API Key 需修改 GitHub Secrets (AI_BENCHMARK_API_KEY) 后重新部署" >> $GITHUB_STEP_SUMMARY
          echo "- 查看配置状态: \`cat /root/yaklang-ai-training-materials/ai-vuln-detection-benchmark-service/config.json\`" >> $GITHUB_STEP_SUMMARY
